name: "TLM Outcome Tracker"
description: "Assesses outcomes of merged PRs and maintains TLM review memory"
inputs:
  anthropic-api-key:
    description: "Anthropic API key"
    required: true
  github-token:
    description: "GitHub token with repo read permissions"
    required: true
  model:
    description: "Claude model for assessment"
    required: false
    default: "claude-opus-4-6"
  lookback-days:
    description: "How many days back to look for merged PRs"
    required: false
    default: "14"
outputs:
  assessed-count:
    description: "Number of PRs assessed in this run"
  updated-memory:
    description: "Whether the TLM memory file was updated"
runs:
  using: "node20"
  main: "dist/index.js"
