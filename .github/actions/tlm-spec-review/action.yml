name: "TLM Spec Review"
description: "Reviews and improves handoff file specifications before execution by Claude Code"
inputs:
  anthropic-api-key:
    description: "Anthropic API key"
    required: true
  github-token:
    description: "GitHub token with contents:write and pull-requests:write permissions"
    required: true
  model:
    description: "Claude model for spec review"
    required: false
    default: "claude-opus-4-6"
runs:
  using: "node20"
  main: "dist/index.js"
