name: TLM Code Review

on:
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (CI already passed)"
        required: true
        type: string

# One review at a time per PR; cancel stale runs when new commits arrive
concurrency:
  group: tlm-review-pr-${{ github.event.check_suite.pull_requests[0].number || github.event.check_suite.head_sha || 'unknown' }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run only on check_suite completion from GitHub Actions (CI) or manual dispatch
    # Skip check_suite events from other apps (Vercel, etc.) to avoid redundant runs
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'check_suite' &&
       github.event.check_suite.app.slug == 'github-actions' &&
       github.event.check_suite.conclusion == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run TLM Review
        uses: ./.github/actions/tlm-review
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          model: "claude-opus-4-6"
          auto-merge: "true"
          max-diff-lines: "500"
