name: Execute Handoff

on:
  workflow_run:
    workflows: ["TLM Spec Review"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch containing the handoff file'
        required: true
      handoff_file:
        description: 'Path to handoff file (e.g. handoffs/awaiting_handoff/my-handoff.md)'
        required: true
      review_feedback:
        description: 'Feedback from Code Review or CI failures to address on retry (optional)'
        required: false
        default: ''

# Per-branch concurrency so parallel handoffs don't cancel each other
concurrency:
  group: execute-handoff-${{ github.event.workflow_run.head_branch || github.event.inputs.branch || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # For workflow_run: only run if spec review succeeded AND not on main/master
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch != 'main' &&
       github.event.workflow_run.head_branch != 'master')
    steps:
      - name: Determine branch and handoff file
        id: params
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
            echo "handoff_file=${{ github.event.inputs.handoff_file }}" >> $GITHUB_OUTPUT
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            # Will be resolved after checkout
            echo "handoff_file=auto" >> $GITHUB_OUTPUT
          fi

      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.params.outputs.branch }}
          fetch-depth: 0

      - name: Find handoff file
        id: handoff
        run: |
          if [ "${{ steps.params.outputs.handoff_file }}" != "auto" ]; then
            echo "file=${{ steps.params.outputs.handoff_file }}" >> $GITHUB_OUTPUT
          else
            # Strategy: find handoff .md files that were added or modified on this
            # branch compared to main. This avoids picking up stale handoff files
            # from previous PRs that were already merged.
            # git diff --diff-filter=AM only shows Added or Modified files.
            HANDOFF=$(git diff --name-only --diff-filter=AM origin/main...HEAD -- 'handoffs/**/*.md' 'handoffs/*.md' | grep -v README | head -1)

            # Fallback: if git diff finds nothing (e.g. branch is behind main),
            # try the filesystem search but prefer awaiting_handoff/ files
            if [ -z "$HANDOFF" ]; then
              echo "git diff found no new handoff files, trying filesystem fallback..."
              HANDOFF=$(find handoffs/awaiting_handoff -name '*.md' -not -name 'README*' 2>/dev/null | head -1)
            fi

            if [ -z "$HANDOFF" ]; then
              echo "No handoff files found on this branch"
              exit 1
            fi
            echo "Auto-detected handoff: $HANDOFF"
            echo "file=$HANDOFF" >> $GITHUB_OUTPUT
          fi

      - name: Verify handoff file exists
        run: |
          if [ ! -f "${{ steps.handoff.outputs.file }}" ]; then
            echo "Handoff file not found: ${{ steps.handoff.outputs.file }}"
            exit 1
          fi
          echo "Executing handoff: ${{ steps.handoff.outputs.file }}"
          head -20 "${{ steps.handoff.outputs.file }}"

      - name: Parse budget from handoff metadata
        id: budget
        run: |
          # Look for "Max Budget: $X" or "Max Budget: $X.XX" in the metadata section
          BUDGET=$(grep -i 'max budget' "${{ steps.handoff.outputs.file }}" | head -1 | grep -oP '\$\K[0-9]+(\.[0-9]+)?' || echo "")
          if [ -z "$BUDGET" ]; then
            echo "No budget found in handoff metadata, using default: \$5"
            BUDGET="5"
          else
            echo "Budget from handoff: \$$BUDGET"
          fi
          echo "amount=$BUDGET" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "claude[bot]"
          git config user.email "209825114+claude[bot]@users.noreply.github.com"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Write execution prompt
        run: |
          REVIEW_FEEDBACK="${{ github.event.inputs.review_feedback }}"

          cat > /tmp/execute-prompt.txt <<'ENDPROMPT'
          You are executing a handoff file for the agent-forge project.

          Read and execute the handoff file at `${{ steps.handoff.outputs.file }}`.

          Follow the handoff file's own step numbering exactly. The handoff file is the
          single source of truth for what needs to happen. Do not assume any steps exist
          that are not written in the file.

          Important context:
          - Step 0 (branch setup) is already complete. The branch is checked out and
            dependencies are installed via npm ci. Skip Step 0 entirely.
          - Start from the Pre-flight Self-Check, then execute each numbered
            implementation step in order.
          - Do NOT skip verification steps (tsc, build, lint, test). Run `npm test` before pushing — CI will reject code with failing tests.
          - If build fails after 3 attempts, follow the Session Abort Protocol in the
            handoff file.
          - After implementation and verification pass, commit all changes and push to
            this branch.
          - Open a PR against main using `gh pr create`. GITHUB_TOKEN is available in
            the environment for gh CLI operations.
          - Git is already configured. Use `gh pr create` for PRs.
          - If the handoff specifies auto-merge for low-risk items, run:
            gh pr merge --auto --squash
          ENDPROMPT

          # Append review/CI feedback for retry runs
          if [ -n "$REVIEW_FEEDBACK" ]; then
            cat >> /tmp/execute-prompt.txt <<FEEDBACK_EOF

          IMPORTANT — RETRY CONTEXT:
          A previous attempt on this branch produced code that was reviewed or tested.
          The following feedback MUST be addressed in this run. Fix all issues mentioned
          below before committing and pushing:

          $REVIEW_FEEDBACK
          FEEDBACK_EOF
            echo "Review feedback appended to execution prompt (${#REVIEW_FEEDBACK} chars)"
          fi

      - name: Execute handoff with Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GH_PAT is a fine-grained PAT that triggers downstream workflows.
          # The default GITHUB_TOKEN suppresses workflow triggers (GitHub's
          # infinite-loop prevention). Without GH_PAT, TLM Code Review won't
          # run on pipeline-generated PRs.
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        timeout-minutes: 25
        run: |
          set -o pipefail
          echo "Using budget: \$${{ steps.budget.outputs.amount }}"
          claude -p "$(cat /tmp/execute-prompt.txt)" \
            --dangerously-skip-permissions \
            --model claude-opus-4-6 \
            --max-budget-usd ${{ steps.budget.outputs.amount }} \
            --output-format json \
            2>&1 | tee /tmp/claude-output.log

      - name: Ensure PR exists (fallback)
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.params.outputs.branch }}"

          # Check if Claude Code already created a PR (open)
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "PR #$PR_NUMBER already exists for branch $BRANCH"
            exit 0
          fi

          # Check if a PR was already merged for this branch (fast auto-merge case).
          # If a PR was created and merged before this fallback runs, creating
          # another PR produces an orphan that blocks the pipeline.
          MERGED_COUNT=$(gh pr list --head "$BRANCH" --state merged --json number --jq 'length' 2>/dev/null || echo "0")
          if [ "$MERGED_COUNT" -gt 0 ]; then
            echo "A PR for branch $BRANCH was already merged. Skipping fallback PR creation."
            exit 0
          fi

          # Check if there are actually implementation commits ahead of main
          # (more than just the handoff commit)
          COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo "0")
          if [ "$COMMITS_AHEAD" -le 1 ]; then
            echo "::warning::No implementation commits found (only handoff commit). Claude Code may have failed to produce changes."
            exit 0
          fi

          echo "No PR found for branch $BRANCH ($COMMITS_AHEAD commits ahead). Creating fallback PR..."

          # Use the last commit message as PR title
          LAST_COMMIT=$(git log -1 --format="%s" 2>/dev/null || echo "Handoff execution on $BRANCH")

          gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "$LAST_COMMIT" \
            --body "## Summary

          Automated PR created by execute-handoff workflow fallback.

          **Handoff:** \`${{ steps.handoff.outputs.file }}\`
          **Branch:** \`$BRANCH\`
          **Commits ahead of main:** $COMMITS_AHEAD

          > This PR was created because the Claude Code executor did not create one during handoff execution. The code changes were committed successfully but PR creation was skipped (likely due to budget exhaustion or execution error)." \
            || echo "::warning::Failed to create fallback PR for branch $BRANCH"

      - name: Wait for CI and report failures
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.params.outputs.branch }}"
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No open PR found for branch $BRANCH, skipping CI wait."
            exit 0
          fi

          echo "Found PR #$PR_NUMBER, waiting for CI checks (10 min timeout)..."

          if timeout 600 gh pr checks "$PR_NUMBER" --watch; then
            echo "All CI checks passed."
          else
            echo "CI checks failed for PR #$PR_NUMBER"

            # Fetch failed check logs
            FAILED_CHECKS=$(gh pr checks "$PR_NUMBER" --json name,state,description --jq '.[] | select(.state == "FAILURE") | "- **\(.name)**: \(.description // "No description")"')

            COMMENT_BODY=$(cat <<CIEOF
          ## CI Failure Detected

          The code pushed by this handoff execution has failing CI checks:

          ${FAILED_CHECKS}

          The execute-handoff workflow is marking this run as failed. Please inspect the CI logs and fix the issues.
          CIEOF
          )

            gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY"
            exit 1
          fi

      - name: Parse execution cost
        id: cost
        if: always()
        run: |
          COST=""
          TOKENS=""

          if [ -f /tmp/claude-output.log ]; then
            # JSON output from --output-format json: top-level total_cost_usd field
            COST=$(jq -r '.total_cost_usd // empty' /tmp/claude-output.log 2>/dev/null || echo "")

            if [ -z "$COST" ]; then
              # Fallback: search for cost pattern in raw output
              COST=$(grep -oP '"total_cost_usd"\s*:\s*\K[0-9.]+' /tmp/claude-output.log | tail -1 || echo "")
            fi

            # Extract token counts from JSON usage object
            INPUT_TOKENS=$(jq -r '.usage.input_tokens // empty' /tmp/claude-output.log 2>/dev/null || echo "0")
            OUTPUT_TOKENS=$(jq -r '.usage.output_tokens // empty' /tmp/claude-output.log 2>/dev/null || echo "0")
            TOKENS="${INPUT_TOKENS:-0} in / ${OUTPUT_TOKENS:-0} out"
          fi

          echo "cost=${COST:-unknown}" >> $GITHUB_OUTPUT
          echo "tokens=${TOKENS:-unknown}" >> $GITHUB_OUTPUT

          # Write a multi-line summary for the PR comment
          cat > /tmp/cost-summary.md <<EOF
          ### Execution Cost
          - **Budget:** \$${{ steps.budget.outputs.amount }}
          - **Actual cost:** ${COST:+\$${COST}}${COST:-unknown}
          - **Tokens:** ${TOKENS:-unknown}
          - **Model:** claude-opus-4-6
          EOF

      - name: Comment cost on PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Find open PR for this branch
          PR_NUMBER=$(gh pr list --head "${{ steps.params.outputs.branch }}" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr comment "$PR_NUMBER" --body "$(cat /tmp/cost-summary.md)"
            echo "Cost summary posted to PR #$PR_NUMBER"
          else
            echo "No open PR found for branch ${{ steps.params.outputs.branch }}, skipping cost comment"
          fi

      - name: Report cost to Agent Forge
        if: always()
        env:
          AGENT_FORGE_API_SECRET: ${{ secrets.AGENT_FORGE_API_SECRET }}
          AGENT_FORGE_URL: ${{ vars.AGENT_FORGE_URL || 'https://agent-forge-phi.vercel.app' }}
        run: |
          COST_VALUE="${{ steps.cost.outputs.cost }}"
          # Strip $ prefix if present
          COST_VALUE="${COST_VALUE#\$}"

          if [ "$COST_VALUE" != "unknown" ] && [ -n "$COST_VALUE" ]; then
            echo "Reporting cost $COST_VALUE to Agent Forge..."
            HTTP_STATUS=$(curl -s -o /tmp/cost-response.json -w "%{http_code}" \
              -X POST "${AGENT_FORGE_URL}/api/costs/record" \
              -H "Authorization: Bearer ${AGENT_FORGE_API_SECRET}" \
              -H "Content-Type: application/json" \
              -d "{
                \"branch\": \"${{ steps.params.outputs.branch }}\",
                \"repo\": \"${{ github.repository }}\",
                \"agentType\": \"executor\",
                \"costUsd\": ${COST_VALUE}
              }")
            echo "Agent Forge response: $HTTP_STATUS"
            cat /tmp/cost-response.json 2>/dev/null || true
          else
            echo "Cost unknown — skipping Agent Forge cost report"
          fi

      - name: Report results
        if: always()
        run: |
          echo "=== Post-execution status ==="
          echo "Branch: ${{ steps.params.outputs.branch }}"
          echo "Handoff: ${{ steps.handoff.outputs.file }}"
          echo "Budget: \$${{ steps.budget.outputs.amount }}"
          echo "Actual cost: ${{ steps.cost.outputs.cost }}"
          echo "Tokens: ${{ steps.cost.outputs.tokens }}"
          echo ""
          echo "Git log (last 3 commits):"
          git log --oneline -3
          echo ""
          echo "Git status:"
          git status --short
          echo ""
          echo "Open PRs from this branch:"
          gh pr list --head "${{ steps.params.outputs.branch }}" --state open || echo "No PRs found"
