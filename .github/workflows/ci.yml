name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to run CI on'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm test
