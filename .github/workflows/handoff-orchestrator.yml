name: Handoff Lifecycle Orchestrator

on:
  workflow_run:
    workflows:
      - "TLM Spec Review"
      - "Execute Handoff"
      - "TLM Code Review"
      - "CI"
      - "TLM QA Agent"
    types: [completed]
    branches-ignore:
      - main
      - master
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to inspect state for"
        required: false

# Per-branch concurrency to avoid race conditions on the same handoff
concurrency:
  group: handoff-orchestrator-${{ github.event.workflow_run.head_branch || github.event.pull_request.head.ref || github.event.inputs.branch || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Handoff Orchestrator
        uses: ./.github/actions/handoff-orchestrator
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
